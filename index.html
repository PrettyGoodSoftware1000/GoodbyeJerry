<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0a0a0a;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .stage {
      width: min(92vw, 1280px);
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                  0 0 0 1px rgba(255, 255, 255, 0.04);
      position: relative;
    }

    /* The video element. No controls -> no player UI is visible. */
    #vid {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
    }

    /* Block any accidental interaction that could reveal native UI */
    #vid::-webkit-media-controls,
    #vid::-webkit-media-controls-panel,
    #vid::-webkit-media-controls-play-button,
    #vid::-webkit-media-controls-start-playback-button {
      display: none !important;
      -webkit-appearance: none;
    }

    .down-btn {
      appearance: none;
      background: #161616;
      border: 1px solid #2a2a2a;
      color: #f5f5f5;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 40px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 120ms ease, background 160ms ease, border-color 160ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .down-btn:hover:not(:disabled) {
      background: #1f1f1f;
      border-color: #3a3a3a;
    }
    .down-btn:active:not(:disabled) {
      transform: scale(0.92);
    }
    .down-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .down-btn:focus-visible {
      outline: 2px solid #888;
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <!--
      The video has NO `controls` attribute, so no player UI is shown.
      `preload="auto"` warms up the file so playback after the sound is instant.
      `playsinline` keeps it inline on iOS (no fullscreen takeover).
      Set the `src` to whatever filename you upload alongside this index.html.
    -->
    <video
      id="vid"
      src="video.mp4"
      preload="auto"
      playsinline
      disablepictureinpicture
      controlslist="nodownload noplaybackrate nofullscreen noremoteplayback"
    ></video>
  </div>

  <button class="down-btn" id="downBtn" aria-label="Thumbs down" title="Thumbs down">
    👎
  </button>

  <script>
    const vid = document.getElementById('vid');
    const btn = document.getElementById('downBtn');

    // ---------- Make sure we are parked on the FIRST FRAME ----------
    // Some browsers show a black box until currentTime is touched.
    function showFirstFrame() {
      try { vid.currentTime = 0; } catch (_) {}
    }
    vid.addEventListener('loadedmetadata', showFirstFrame);
    // Also rewind to 0 if the video happens to be at the end on reload.
    vid.addEventListener('loadeddata', showFirstFrame);

    // ---------- Sad-trombone sound effect (Web Audio, no extra file) ----------
    // If you'd rather use your own audio file, see the note at the bottom.
    function playSadTrombone() {
      return new Promise((resolve) => {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { resolve(); return; }

        const ctx = new AC();
        const master = ctx.createGain();
        master.gain.value = 0.22;

        // Gentle low-pass to make the sawtooth less harsh / more "brassy"
        const lp = ctx.createBiquadFilter();
        lp.type = 'lowpass';
        lp.frequency.value = 1800;
        lp.Q.value = 0.7;

        master.connect(lp).connect(ctx.destination);

        // Classic "wah-wah-wah-waaah" descent
        const notes = [
          { f: 466.16, d: 0.22 }, // Bb4
          { f: 415.30, d: 0.22 }, // Ab4
          { f: 369.99, d: 0.22 }, // F#4
          { f: 311.13, d: 0.75 }, // Eb4 (held)
        ];

        let t = ctx.currentTime + 0.04;

        notes.forEach((n) => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';

          // Slight downward pitch bend within each note for that mopey feel
          osc.frequency.setValueAtTime(n.f, t);
          osc.frequency.linearRampToValueAtTime(n.f * 0.96, t + n.d);

          // Envelope
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(1, t + 0.025);
          g.gain.setValueAtTime(1, t + Math.max(0, n.d - 0.08));
          g.gain.linearRampToValueAtTime(0, t + n.d);

          osc.connect(g).connect(master);
          osc.start(t);
          osc.stop(t + n.d + 0.02);

          t += n.d;
        });

        const totalMs = (t - ctx.currentTime) * 1000 + 80;
        setTimeout(() => {
          try { ctx.close(); } catch (_) {}
          resolve();
        }, totalMs);
      });
    }

    // ---------- Click handler ----------
    btn.addEventListener('click', async () => {
      btn.disabled = true;

      // Play the sad sound, then start the video the instant it finishes.
      await playSadTrombone();

      // The video was preloaded, so this is effectively seamless.
      // No `loop` attribute -> the video naturally stops on the last frame.
      try {
        await vid.play();
      } catch (err) {
        // If playback was blocked for any reason, surface it in the console.
        console.warn('Video play() was blocked:', err);
        btn.disabled = false;
      }
    });
  </script>

  <!--
    ──────────────────────────────────────────────────────────────────────────
    Setup notes (for when you upload to GitHub):

    1. Put this file in the repo as `index.html`.
    2. Put your 1280×720 video in the SAME folder as `video.mp4`
       (or rename the `src=""` above to match your filename).
       GitHub allows files up to 100 MB. If your mp4 is larger, use Git LFS.
    3. To serve via GitHub Pages: Settings → Pages → Source: `main` / root.
       The page will be at https://<user>.github.io/<repo>/

    Optional: use your own sound file instead of the synthesized one.
      • Drop e.g. `sound.mp3` next to index.html
      • Replace the body of the click handler with:

          const sfx = new Audio('sound.mp3');
          sfx.addEventListener('ended', () => vid.play());
          sfx.play();
    ──────────────────────────────────────────────────────────────────────────
  -->
</body>
</html>
